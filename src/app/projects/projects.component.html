<section class="project-section">
    <section class="section-heading">
        <h3 class="section-heading">Projects</h3>
    </section>
    <div class="project-grid">
        <div class="project-card" *ngFor="let project of projects">
            <div class="image-wrapper">
                <img [src]="project.imageUrl" alt="{{ project.title }}" />
                <div class="overlay">
                    <a [href]="project.link" target="_blank" rel="noopener noreferrer" class="view-btn">
                        View Project
                    </a>
                    <a [href]="project.githubLink" target="_blank" rel="noopener noreferrer" class="github-btn" aria-label="GitHub Link">
                        <svg height="24" width="24" fill="white" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 0.297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577
              0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.087-.744.084-.729.084-.729
              1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.76-1.605-2.665-.3-5.466-1.334-5.466-5.931
              0-1.31.468-2.38 1.236-3.22-.124-.303-.536-1.523.117-3.176 0 0 1.008-.322 3.3 1.23a11.52 11.52 0 013.003-.404
              c1.02.005 2.045.138 3.003.404 2.29-1.552 3.295-1.23 3.295-1.23.655 1.653.243 2.873.12 3.176.77.84
              1.234 1.91 1.234 3.22 0 4.609-2.807 5.628-5.48 5.922.43.37.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286
              0 .321.216.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                        </svg>
                    </a>
                </div>
            </div>
            <div class="project-info">
                <h3 class="project-title">{{ project.title }}</h3>
                <p class="project-desc">{{ project.description }}</p>
                <div class="tech-stack">
                    <span *ngFor="let tech of project.technologies" class="tech-badge">{{ tech }}</span>
                </div>
            </div>
        </div>
    </div>
</section>
